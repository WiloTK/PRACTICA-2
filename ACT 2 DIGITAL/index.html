<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase 06 - Práctica de Cajas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .caja-titulo {
            width: 80%;
            margin: 20px;
            border: 5px solid #333;
            padding: 50px;
            background-image:url(https://es.pinterest.com/pin/4785143351994016/);
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        .caja-titulo h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            margin: 0;
        }

        .caja-concepto {
            width: 80%;
            margin: 15px;
            border: 3px dashed #2c3e50;
            padding: 30px;
            background-color: #ecf0f1;
            color: #2980b9;
        }

        .caja-nombre {
            width: 80%;
            margin: 25px;
            border: 4px double #8e44ad;
            padding: 20px;
            background-color: #f9ebff;
            color: #6c3483;
            font-size: 24px;
            font-weight: bold;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="caja-titulo">
        <h1>CLASE 6</h1>
    </div>

    <div class="caja-concepto">
        <p><strong>Que es CSS:</strong> Es el lenguaje que utilizamos para dar estilo a un documento HTML. Describe cómo deben mostrarse los elementos en la pantalla, permitiendo separar el contenido de la presentación visual.</p>
    </div>

    <div class="caja-nombre">
        Wilber Omar Chavez Marroquin
    </div>

</body>
</html>
